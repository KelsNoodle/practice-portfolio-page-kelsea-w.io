<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <main class="flex-col">
        <div class="box">
            <form>
                <h4>Contact me by filling out this form:</h4>
                    <div class="field-with-label">
                        <input id="name-input" name="name-input" type="text"
                        required />
                        <label for="name-input">Name</label>
                    </div>
                    <div class="field-with-label">
                        <input id="address1-input" name="address1-input" type="text"/>
                        <label for="address1-input">Address Line 1</label>
                    </div>

                    <div class="field-with-label">
                        <input id="address2-input" name="address2-input" type="text"/>
                        <label for="address2-input">Address Line 2
                            <input id="omit-address2" name="omit-address2" 
                            type="checkbox" />
                            <label for="omit-address2" class="checkbox-label">
                            Check if not needed</label>
                        </label>
                    </div>
                    <div class="field-with-label">
                        <input id="phone-input" name="phone-input" type="tel"/>
                        <label for="phone-input">Phone Number</label>
                    </div>
                    <div class="field-with-label">
                        <input id="email-input" name="email-input" type="email"
                        required />
                        <label for="email-input">E-Mail Address</label>
                    </div>
                    <div class="form-group flex-col">
                        <div class="space-between">
                            <select id="quantity-input" name="quantity-input"
                            required>

                            </select>
                        </div>
                        <div class="form-group">
                        <button id="reset-button" type="reset">Reset</button>
                        <button id="save-button" type="submit">Confirm</button>
                        </div>
                    </div>
                    
            </form>
        </div>
    </main>
    
</body>
</html>
